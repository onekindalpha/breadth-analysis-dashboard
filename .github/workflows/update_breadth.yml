name: Update KR Breadth Data

on:
  schedule:
    - cron: "30 9 * * 1-5"   # 평일 오후 6시 30분 KST (UTC+9)
    - cron: "0 22 * * 0-4"   # 평일 오전 7시 KST (UTC+9)
  workflow_dispatch:          # 수동 실행 가능
    inputs:
      init_prices:
        description: "과거 prices 초기화 (최초 1회, 시간 오래 걸림)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests pandas finance-datareader pykrx

      - name: Run update script (init-prices mode)
        if: ${{ github.event.inputs.init_prices == 'true' }}
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: |
          echo "=== prices 초기화 모드 ==="
          python update_breadth.py --init-prices --days 420 || true

      - name: Run update script (daily mode)
        if: ${{ github.event.inputs.init_prices != 'true' }}
        env:
          KRX_AUTH_KEY: ${{ secrets.KRX_AUTH_KEY }}
        run: python update_breadth.py || true

      - name: Commit and push updated CSVs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash || true
          git pull --rebase origin main
          git stash pop || true
          git add data/
          git diff --cached --quiet || git commit -m "chore: update breadth data $(date +%Y%m%d)"
          git push
